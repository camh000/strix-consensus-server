version: '3.8'

services:
  orchestrator:
    build:
      context: ./orchestrator
      dockerfile: Dockerfile
    ports:
      - "${ORCHESTRATOR_PORT:-8080}:8080"
    volumes:
      - ./config:/app/config
      - ./models:/app/models
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - MODE=${MODE:-consensus}
      - WORKER_COUNT=${WORKER_COUNT:-3}
      - JUDGE_ENABLED=${JUDGE_ENABLED:-true}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    restart: unless-stopped
    networks:
      - strix-network

  web-manager:
    build:
      context: ./web-manager
      dockerfile: Dockerfile
    ports:
      - "${WEB_MANAGER_PORT:-5000}:5000"
    volumes:
      - ./config:/app/config
      - ./models:/app/models
      - ./logs:/app/logs
    environment:
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - FLASK_ENV=production
    restart: unless-stopped
    networks:
      - strix-network
    depends_on:
      - orchestrator

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./config/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web-manager
    restart: unless-stopped
    networks:
      - strix-network

  # Worker models - dynamically created via orchestrator
  # These are placeholders for reference

networks:
  strix-network:
    driver: bridge

volumes:
  models:
  logs:
