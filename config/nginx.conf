# Nginx Configuration for Strix Consensus Server
# Place this in /etc/nginx/sites-available/strix-consensus
# Then: sudo ln -s /etc/nginx/sites-available/strix-consensus /etc/nginx/sites-enabled/
# And: sudo systemctl restart nginx

server {
    listen 80;
    server_name localhost;

    # Web Manager (Flask app on port 5000)
    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Orchestrator API (FastAPI on port 8080)
    location /api/ {
        proxy_pass http://127.0.0.1:8080/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Increase timeout for long-running consensus operations
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://127.0.0.1:8080/health;
        access_log off;
    }

    # Static files (if needed)
    location /static {
        alias /var/www/strix/static;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
